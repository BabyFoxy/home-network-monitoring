version: "3.8"

# ─────────────────────────────────────────────
# DNS Log Visualisation Stack
# Grafana + Loki + Alloy — Synology NAS
# ─────────────────────────────────────────────

networks:
  log-viz-net:
    driver: bridge

volumes:
  grafana-data:
  loki-data:

services:
  grafana:
    image: grafana/grafana:latest
    container_name: log-viz-grafana
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "3300:3000"
    environment:
      TZ: Australia/Sydney
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: http://${NAS_IP:-192.168.1.5}:3300
    volumes:
      - grafana-data:/var/lib/grafana
      - /volume1/docker/log-viz/grafana/provisioning:/etc/grafana/provisioning:ro

  loki:
    image: grafana/loki:latest
    container_name: log-viz-loki
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "3100:3100"
    environment:
      TZ: Australia/Sydney
    volumes:
      - loki-data:/loki
      - /volume1/docker/log-viz/loki/config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml

  alloy:
    image: grafana/alloy:latest
    container_name: log-viz-alloy
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "5514:5514/udp"
      - "12345:12345"
    environment:
      TZ: Australia/Sydney
    volumes:
      - /volume1/docker/log-viz/alloy/config.alloy:/etc/alloy/config.alloy:ro
      - /volume1/docker/adguard/work/data:/adguard-logs:ro
    command: run /etc/alloy/config.alloy
