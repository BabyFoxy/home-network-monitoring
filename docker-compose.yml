version: "3.8"

# ─────────────────────────────────────────────
# DNS Log Visualisation Stack
# Grafana + Loki + Alloy — Synology NAS
#
# 使用前改这两个环境变量：
#   GRAFANA_ADMIN_PASSWORD  → Grafana 登录密码
#   NAS_IP                  → 你的 NAS IP（例如 192.168.1.5）
# ─────────────────────────────────────────────

networks:
  log-viz-net:
    driver: bridge

volumes:
  grafana-data:
  loki-data:

configs:
  loki_config:
    content: |
      auth_enabled: false
      server:
        http_listen_port: 3100
        grpc_listen_port: 9096
        log_level: warn
      common:
        instance_addr: 127.0.0.1
        path_prefix: /loki
        storage:
          filesystem:
            chunks_directory: /loki/chunks
            rules_directory: /loki/rules
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory
      schema_config:
        configs:
          - from: 2024-01-01
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        reject_old_samples: true
        reject_old_samples_max_age: 168h
        retention_period: 2160h
      compactor:
        working_directory: /loki/compactor
        retention_enabled: true
        retention_delete_delay: 2h
        retention_delete_worker_count: 150
        delete_request_store: filesystem
      analytics:
        reporting_enabled: false

  alloy_config:
    content: |
      loki.write "default" {
        endpoint {
          url = "http://loki:3100/loki/api/v1/push"
        }
      }

      local.file_match "adguard_querylog" {
        path_targets = [{
          __path__ = "/adguard-logs/querylog.json",
        }]
        sync_period = "5s"
      }

      loki.source.file "adguard_file" {
        targets    = local.file_match.adguard_querylog.targets
        forward_to = [loki.process.adguard_parse.receiver]
      }

      loki.process "adguard_parse" {
        forward_to = [loki.write.default.receiver]

        stage.json {
          expressions = {
            client      = "client",
            status      = "status",
            reason      = "reason",
            disallowed  = "disallowed",
            upstream    = "upstream",
            cached      = "cached",
            event_time  = "time",
          }
        }

        stage.json {
          source      = ""
          expressions = { client_info_raw = "client_info" }
        }

        stage.json {
          source      = "client_info_raw"
          expressions = { client_name = "name" }
        }

        stage.json {
          source      = ""
          expressions = { question_raw = "question" }
        }

        stage.json {
          source      = "question_raw"
          expressions = {
            domain     = "name",
            query_type = "type",
          }
        }

        stage.timestamp {
          source = "event_time"
          format = "RFC3339Nano"
        }

        stage.static_labels {
          values = {
            job    = "adguard",
            source = "dns_querylog",
          }
        }

        stage.labels {
          values = {
            client      = "client",
            client_name = "client_name",
            query_type  = "query_type",
            disallowed  = "disallowed",
          }
        }

        stage.template {
          source   = "output"
          template = "{{ .client }} ({{ .client_name }}) -> {{ .domain }} [{{ .query_type }}] status={{ .status }} reason={{ .reason }} blocked={{ .disallowed }} upstream={{ .upstream }} cached={{ .cached }}"
        }

        stage.output {
          source = "output"
        }
      }

      loki.source.syslog "udm_raw" {
        listener {
          address  = "0.0.0.0:5514"
          protocol = "udp"
          labels = {
            job    = "udm",
            source = "syslog",
          }
        }
        forward_to = [loki.write.default.receiver]
      }

  grafana_datasource:
    content: |
      apiVersion: 1
      datasources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki:3100
          isDefault: true
          editable: false
          jsonData:
            maxLines: 5000

services:
  grafana:
    image: grafana/grafana:latest
    container_name: log-viz-grafana
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "3300:3000"
    environment:
      TZ: Australia/Sydney
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-changeme}
      GF_SERVER_ROOT_URL: http://${NAS_IP:-192.168.1.5}:3300
    volumes:
      - grafana-data:/var/lib/grafana
    configs:
      - source: grafana_datasource
        target: /etc/grafana/provisioning/datasources/loki.yml

  loki:
    image: grafana/loki:latest
    container_name: log-viz-loki
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "3100:3100"
    environment:
      TZ: Australia/Sydney
    volumes:
      - loki-data:/loki
    configs:
      - source: loki_config
        target: /etc/loki/local-config.yaml
    command: -config.file=/etc/loki/local-config.yaml

  alloy:
    image: grafana/alloy:latest
    container_name: log-viz-alloy
    restart: unless-stopped
    networks:
      - log-viz-net
    ports:
      - "5514:5514/udp"
      - "12345:12345"
    environment:
      TZ: Australia/Sydney
    volumes:
      - /volume1/docker/adguard/work/data:/adguard-logs:ro
    configs:
      - source: alloy_config
        target: /etc/alloy/config.alloy
    command: run /etc/alloy/config.alloy
